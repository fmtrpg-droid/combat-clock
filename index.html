<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Combat Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#161210; --bg2:#1f1a13; --bg3:#2a221a; --border:#3a2f20;
      --gold:#e8c97a; --gold-dim:#9a7f3a; --gold-glow:rgba(232,201,122,0.18);
      --red:#c0392b; --red-glow:rgba(192,57,43,0.2);
      --amber:#c07a3a;
      --text:#ede0c4; --muted:#6e6248; --active-bg:#2c2318; --radius:3px;
    }
    html,body { width:300px; background:var(--bg); color:var(--text);
      font-family:'Crimson Text',Georgia,serif; font-size:14px; overflow-x:hidden; }
    body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:100;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); }

    .panel { padding:12px 12px 12px; display:flex; flex-direction:column; gap:6px; }

    /* в”Ђв”Ђ Header в”Ђв”Ђ */
    header { display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:2px; }
    header h1 { font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.2em; color:var(--gold-dim); }
    .round-badge { font-family:'Cinzel',serif; font-size:11px; color:var(--gold);
      background:var(--bg2); border:1px solid var(--border); border-radius:2px; padding:2px 8px; }

    /* в”Ђв”Ђ Collapsible section wrapper в”Ђв”Ђ */
    .collapsible { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }

    .coll-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:7px 10px; background:var(--bg2); cursor:pointer;
      user-select:none; transition:background 0.15s;
    }
    .coll-header:hover { background:var(--active-bg); }

    .coll-title {
      font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:6px;
    }
    .coll-title.has-alert { color:var(--gold); }

    .coll-arrow {
      font-size:9px; color:var(--muted); transition:transform 0.2s;
    }
    .collapsible.open .coll-arrow { transform:rotate(90deg); }

    .coll-body {
      display:none; padding:10px; background:var(--bg);
      border-top:1px solid var(--border);
    }
    .collapsible.open .coll-body { display:block; }

    /* в”Ђв”Ђ Calendar body в”Ђв”Ђ */
    .cal-date-big { font-family:'Cinzel',serif; font-size:15px; color:var(--gold);
      text-align:center; line-height:1.3; margin-bottom:2px; }
    .cal-year { font-size:11px; color:var(--muted); text-align:center; letter-spacing:0.12em; margin-bottom:6px; }
    .cal-holiday { font-size:11px; color:var(--amber); text-align:center;
      font-style:italic; margin-bottom:4px; }

    .cal-reminder-due { font-size:11px; color:var(--gold); text-align:center; font-style:italic;
      background:rgba(232,201,122,0.08); border:1px solid var(--gold-dim);
      border-radius:var(--radius); padding:3px 6px; margin-bottom:4px;
      animation:remPulse 2s ease-in-out infinite; }
    @keyframes remPulse {
      0%,100% { box-shadow:0 0 0 rgba(232,201,122,0);    background:rgba(232,201,122,0.08); }
      50%      { box-shadow:0 0 10px rgba(232,201,122,0.4); background:rgba(232,201,122,0.18); }
    }

    /* pulse dot shown in collapsed header when reminder due */
    .pulse-dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--gold); display:inline-block;
      animation:dotPulse 1.4s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity:1; box-shadow:0 0 0 rgba(232,201,122,0); }
      50%      { opacity:0.5; box-shadow:0 0 6px rgba(232,201,122,0.7); }
    }

    .cal-nav { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:4px; margin-bottom:6px; }
    .cal-btn { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em; padding:5px 4px;
      background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--muted); cursor:pointer; transition:all 0.15s; text-align:center; }
    .cal-btn:hover { color:var(--text); background:var(--active-bg); }
    .cal-btn:active { transform:scale(0.95); }
    .cal-btn.gold { color:var(--gold); border-color:var(--gold-dim); }
    .cal-btn.gold:hover { box-shadow:0 0 8px var(--gold-glow); }

    /* set date form */
    .set-date-form { display:none; flex-direction:column; gap:6px; padding-top:8px;
      border-top:1px solid var(--border); margin-top:4px; }
    .set-date-form.open { display:flex; }
    .set-date-row { display:flex; gap:5px; align-items:center; }
    .set-date-row label { font-size:11px; color:var(--muted); width:38px; flex-shrink:0; }
    .set-date-row select, .set-date-row input {
      flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text); font-family:'Crimson Text',serif; font-size:13px; padding:3px 6px; outline:none; }
    .set-date-row select option { background:var(--bg3); }

    /* в”Ђв”Ђ Reminders в”Ђв”Ђ */
    .rem-toolbar { display:flex; justify-content:flex-end; margin-bottom:6px; }
    .icon-btn { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; padding:4px 9px;
      background:var(--bg2); border:1px solid var(--gold-dim); border-radius:var(--radius);
      color:var(--gold); cursor:pointer; transition:all 0.15s; }
    .icon-btn:hover { background:var(--active-bg); }
    .icon-btn:active { transform:scale(0.96); }

    .add-rem-form { display:none; flex-direction:column; gap:5px; padding:8px;
      background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:6px; }
    .add-rem-form.open { display:flex; }
    .add-rem-form select, .add-rem-form input, .add-rem-form textarea {
      background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text); font-family:'Crimson Text',serif; font-size:13px;
      padding:4px 7px; outline:none; }
    .add-rem-form select option { background:var(--bg3); }
    .rem-date-row { display:grid; grid-template-columns:1fr auto 1fr auto 2fr; gap:4px; align-items:center; }
    .rem-sep { color:var(--muted); font-size:11px; text-align:center; }
    .add-rem-form textarea { resize:none; height:46px; }

    #reminder-list { display:flex; flex-direction:column; gap:3px;
      max-height:130px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .rem-item { display:flex; align-items:flex-start; gap:6px; background:var(--bg2);
      border:1px solid var(--border); border-radius:var(--radius); padding:5px 8px; }
    .rem-item.due { border-color:var(--gold-dim); background:var(--active-bg);
      animation:remPulse 2s ease-in-out infinite; }
    .rem-date-badge { font-family:'Cinzel',serif; font-size:10px; color:var(--gold-dim);
      flex-shrink:0; min-width:68px; padding-top:1px; }
    .rem-item.due .rem-date-badge { color:var(--gold); }
    .rem-text { flex:1; font-size:12px; color:var(--text); line-height:1.3; }
    .rem-del { font-size:12px; color:var(--muted); cursor:pointer; flex-shrink:0; padding:0 2px;
      transition:color 0.15s; }
    .rem-del:hover { color:var(--red); }
    .empty-rem { text-align:center; color:var(--muted); font-style:italic; font-size:12px;
      padding:10px 0; border:1px dashed var(--border); border-radius:var(--radius); }

    /* в”Ђв”Ђ Clock face в”Ђв”Ђ */
    .clock-face { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
      padding:10px 16px 8px; display:flex; flex-direction:column; align-items:center; gap:5px;
      box-shadow:inset 0 2px 10px rgba(0,0,0,0.5),0 0 18px var(--gold-glow); position:relative; }
    .clock-face::before { content:''; position:absolute; inset:-1px; border-radius:var(--radius);
      border:1px solid transparent; transition:border-color 0.4s,box-shadow 0.4s; }
    .clock-face.urgent::before { border-color:var(--red);
      box-shadow:0 0 14px var(--red-glow),inset 0 0 10px var(--red-glow);
      animation:pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .time-big { font-family:'Cinzel',serif; font-size:46px; font-weight:700; letter-spacing:0.04em;
      line-height:1; color:var(--gold); text-shadow:0 0 28px rgba(232,201,122,0.35); transition:color 0.3s; }
    .clock-face.urgent .time-big { color:#e05c4a; text-shadow:0 0 20px rgba(192,57,43,0.5); }
    .clock-face.done   .time-big { color:var(--muted); text-shadow:none; }
    .time-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); }
    .progress-track { width:100%; height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; }
    .progress-fill  { height:100%; background:var(--gold-dim); border-radius:2px;
      transition:width 0.25s linear,background 0.3s; }
    .clock-face.urgent .progress-fill { background:var(--red); }

    .time-setter { display:flex; align-items:center; gap:6px; margin-top:6px; }
    .time-input-group { display:flex; align-items:center; gap:3px; background:var(--bg2);
      border:1px solid var(--border); border-radius:var(--radius); padding:4px 8px; flex:1; }
    .time-input-group input { width:32px; background:transparent; border:none; outline:none;
      font-family:'Cinzel',serif; font-size:16px; color:var(--text); text-align:center; }
    .time-input-group input[type=number] { -moz-appearance:textfield; }
    .time-input-group input::-webkit-outer-spin-button,
    .time-input-group input::-webkit-inner-spin-button { -webkit-appearance:none; }
    .colon { font-family:'Cinzel',serif; font-size:16px; color:var(--gold-dim); }
    .set-btn { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; padding:6px 10px;
      background:var(--bg3); border:1px solid var(--gold-dim); border-radius:var(--radius);
      color:var(--gold); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .set-btn:hover { background:var(--active-bg); box-shadow:0 0 8px var(--gold-glow); }
    .set-btn:active { transform:scale(0.95); }

    .controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:6px; }
    .ctrl { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
      padding:8px 4px; border:1px solid var(--border); border-radius:var(--radius);
      background:var(--bg2); color:var(--muted); cursor:pointer; transition:all 0.15s; text-align:center; }
    .ctrl:hover  { color:var(--text); background:var(--bg3); }
    .ctrl:active { transform:scale(0.95); }

    /* в”Ђв”Ђ Initiative в”Ђв”Ђ */
    .init-toolbar { display:flex; justify-content:flex-end; margin-bottom:6px; }
    .next-btn { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; padding:4px 10px;
      background:var(--bg2); border:1px solid var(--gold-dim); border-radius:var(--radius);
      color:var(--gold); cursor:pointer; transition:all 0.15s; }
    .next-btn:hover  { background:var(--active-bg); }
    .next-btn:active { transform:scale(0.96); }
    #initiative-list { list-style:none; display:flex; flex-direction:column; gap:3px;
      max-height:150px; overflow-y:auto;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    #initiative-list li { display:flex; align-items:center; gap:6px; background:var(--bg2);
      border:1px solid var(--border); border-radius:var(--radius); padding:4px 8px; transition:all 0.2s; }
    #initiative-list li.active-turn { border-color:var(--gold-dim); background:var(--active-bg);
      box-shadow:0 0 8px var(--gold-glow); }
    #initiative-list li.active-turn .combatant-name { color:var(--gold); }
    .turn-arrow  { font-size:10px; color:var(--gold); width:10px; flex-shrink:0; opacity:0; }
    .active-turn .turn-arrow { opacity:1; }
    .init-badge  { font-family:'Cinzel',serif; font-size:13px; font-weight:600;
      color:var(--gold-dim); width:24px; text-align:center; flex-shrink:0; }
    .combatant-name { flex:1; font-size:13px; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .move-btns { display:flex; flex-direction:column; gap:1px; flex-shrink:0; }
    .move-btn { font-size:8px; line-height:1; padding:2px 4px; background:var(--bg3);
      border:1px solid var(--border); border-radius:2px; color:var(--muted);
      cursor:pointer; transition:all 0.15s; }
    .move-btn:hover { color:var(--gold); border-color:var(--gold-dim); }
    .move-btn:active { transform:scale(0.9); }
    .move-btn:disabled { opacity:0.2; cursor:default; }
    .init-input { font-family:'Cinzel',serif; font-size:13px; font-weight:600;
      color:var(--gold-dim); width:36px; text-align:center; flex-shrink:0;
      background:transparent; border:1px solid transparent; border-radius:2px;
      outline:none; -moz-appearance:textfield; }
    .init-input::-webkit-outer-spin-button,
    .init-input::-webkit-inner-spin-button { -webkit-appearance:none; }
    .init-input:hover { border-color:var(--border); background:var(--bg3); }
    .init-input:focus { border-color:var(--gold-dim); background:var(--bg3); color:var(--gold); }
    .empty-state { text-align:center; color:var(--muted); font-style:italic; font-size:12px;
      padding:12px 0; border:1px dashed var(--border); border-radius:var(--radius); }
    .obr-hint { font-size:10px; color:var(--muted); text-align:center; opacity:0.6; padding-top:6px; }

    /* shared form buttons */
    .form-btns { display:flex; gap:5px; }
    .form-btn { flex:1; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em;
      padding:5px; border-radius:var(--radius); cursor:pointer; transition:all 0.15s;
      text-align:center; border:1px solid var(--border); }
    .form-btn.confirm { background:var(--active-bg); border-color:var(--gold-dim); color:var(--gold); }
    .form-btn.confirm:hover { box-shadow:0 0 8px var(--gold-glow); }
    .form-btn.cancel  { background:var(--bg3); color:var(--muted); }
    .form-btn.cancel:hover { color:var(--text); }

    /* в”Ђв”Ђ Toast в”Ђв”Ђ */
    #toast { position:fixed; bottom:10px; left:50%;
      transform:translateX(-50%) translateY(40px);
      background:var(--bg3); border:1px solid var(--gold-dim); border-radius:var(--radius);
      padding:6px 14px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em;
      color:var(--gold); white-space:nowrap; opacity:0;
      transition:opacity 0.25s,transform 0.25s; z-index:200; pointer-events:none; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="panel">

  <!-- Header -->
  <header>
    <h1>вљ” Combat Clock</h1>
    <div class="round-badge">Round <span id="roundNum">1</span></div>
  </header>

  <!-- в•ђв•ђ CALENDAR (collapsible) в•ђв•ђ -->
  <div class="collapsible open" id="secCalendar">
    <div class="coll-header" data-target="secCalendar">
      <span class="coll-title" id="calHeaderTitle">рџ“… Calendar</span>
      <span class="coll-arrow">в–¶</span>
    </div>
    <div class="coll-body">
      <div class="cal-date-big" id="calDate">вЂ”</div>
      <div class="cal-year"     id="calYear">Year 62 of Concord</div>
      <div class="cal-holiday"  id="calHoliday"  style="display:none"></div>
      <div class="cal-reminder-due" id="calRemDue" style="display:none"></div>

      <div class="cal-nav">
        <button class="cal-btn"      id="btnPrevDay">в—Ђ Day</button>
        <button class="cal-btn"      id="btnPrevMonth">в—Ђ Mo</button>
        <button class="cal-btn gold" id="btnNextMonth">Mo в–¶</button>
        <button class="cal-btn gold" id="btnNextDay">Day в–¶</button>
      </div>

      <button class="cal-btn" id="btnToggleSetDate" style="width:100%">вњЋ Set Date Directly</button>
      <div class="set-date-form" id="setDateForm">
        <div class="set-date-row">
          <label>Day</label>
          <input type="number" id="sdDay" min="1" max="36" value="4" style="width:48px;flex:none"/>
          <span style="font-size:11px;color:var(--muted);margin:0 3px">of</span>
          <select id="sdMonth" style="flex:1"></select>
        </div>
        <div class="set-date-row">
          <label>Year</label>
          <input type="number" id="sdYear" min="0" max="9999" value="62"/>
        </div>
        <div class="form-btns">
          <button class="form-btn confirm" id="btnSetDateConfirm">Confirm</button>
          <button class="form-btn cancel"  id="btnSetDateCancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- в•ђв•ђ REMINDERS (collapsible) в•ђв•ђ -->
  <div class="collapsible open" id="secReminders">
    <div class="coll-header" data-target="secReminders">
      <span class="coll-title" id="remHeaderTitle">рџ“Њ Reminders</span>
      <span class="coll-arrow">в–¶</span>
    </div>
    <div class="coll-body">
      <div class="rem-toolbar">
        <button class="icon-btn" id="btnAddReminder">+ Add</button>
      </div>

      <div class="add-rem-form" id="addRemForm">
        <div class="rem-date-row">
          <input  type="number" id="remDay"   min="1" max="36" placeholder="Day" value="1"/>
          <span class="rem-sep">of</span>
          <select id="remMonth"></select>
          <span class="rem-sep">yr</span>
          <input  type="number" id="remYear"  min="0" max="9999" placeholder="Year"/>
        </div>
        <textarea id="remText" placeholder="Reminder noteвЂ¦"></textarea>
        <div class="form-btns">
          <button class="form-btn confirm" id="btnRemConfirm">Add Reminder</button>
          <button class="form-btn cancel"  id="btnRemCancel">Cancel</button>
        </div>
      </div>

      <div id="reminder-list"></div>
    </div>
  </div>

  <!-- в•ђв•ђ COUNTDOWN (collapsible) в•ђв•ђ -->
  <div class="collapsible open" id="secCountdown">
    <div class="coll-header" data-target="secCountdown">
      <span class="coll-title" id="countdownHeaderTitle">вЏі Countdown</span>
      <span class="coll-arrow">в–¶</span>
    </div>
    <div class="coll-body">
      <div class="clock-face" id="clockFace">
        <div class="time-big"   id="timeDisplay">--:--</div>
        <div class="time-label" id="timeLabel">no timer set</div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:100%"></div>
        </div>
      </div>
      <div class="time-setter">
        <div class="time-input-group">
          <input type="number" id="inputMin" value="10" min="0" max="99"/>
          <span class="colon">:</span>
          <input type="number" id="inputSec" value="00" min="0" max="59"/>
        </div>
        <button class="set-btn" id="btnSet">Set &amp; Reset</button>
      </div>
      <div class="controls">
        <button class="ctrl" id="btnMinus6">в€’6s</button>
        <button class="ctrl" id="btnPlus6">+6s</button>
        <button class="ctrl" id="btnReset">в†є Reset</button>
      </div>
    </div>
  </div>

  <!-- в•ђв•ђ INITIATIVE (collapsible) в•ђв•ђ -->
  <div class="collapsible open" id="secInitiative">
    <div class="coll-header" data-target="secInitiative">
      <span class="coll-title">вљ” Initiative</span>
      <span class="coll-arrow">в–¶</span>
    </div>
    <div class="coll-body">
      <div class="init-toolbar">
        <button class="next-btn" id="btnNext">End Turn в–¶</button>
      </div>
      <ul id="initiative-list">
        <li class="empty-state" id="emptyState">No combatants yet</li>
      </ul>
      <div class="obr-hint" id="obrHint">Right-click tokens в†’ Add to Initiative</div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script type="module">
// в”Ђв”Ђ Calendar constants в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const MONTHS = [
  'Newlight','Bloomtide','Highsky',
  'Greenrise','Suncrest','Goldleaf',
  'Redfall','Frostveil','Longnight'
];
const DAYS_OF_WEEK   = ['Uvatar','Beratar','Zantar','Pintar','Tachtar','Vutar'];
const DAYS_PER_MONTH = 36;
const BUILTIN_HOLIDAYS = [
  { monthIdx:4, day:25, name:'вљ” Day of the Fallen'            },
  { monthIdx:5, day:25, name:'рџ”Ґ Victory of the Mortal Flame' },
];

const EXT_ID   = 'com.gaming.combat-clock';
const META_KEY = `${EXT_ID}/initiative`;
const ROOM_KEY = `${EXT_ID}/state`;

let state = {
  year:62, monthIdx:1, day:4,
  totalSeconds:0, remainSeconds:0, round:1, activeTurnIndex:0,
};
let reminders  = [];
let combatants = [];
let obr = null;
let nextRemId  = 1;

// в”Ђв”Ђ DOM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const $ = id => document.getElementById(id);
const calDateEl   = $('calDate'),   calYearEl  = $('calYear');
const calHolEl    = $('calHoliday'),calRemDueEl= $('calRemDue');
const calHdrTitle = $('calHeaderTitle'), remHdrTitle = $('remHeaderTitle');
const btnPrevDay  = $('btnPrevDay'), btnNextDay  = $('btnNextDay');
const btnPrevMo   = $('btnPrevMonth'),btnNextMo = $('btnNextMonth');
const btnToggleSD = $('btnToggleSetDate'), setDateForm = $('setDateForm');
const sdDay=$('sdDay'),sdMonth=$('sdMonth'),sdYear=$('sdYear');
const btnSDConf=$('btnSetDateConfirm'),btnSDCancel=$('btnSetDateCancel');
const btnAddRem=$('btnAddReminder'),addRemForm=$('addRemForm');
const remDayEl=$('remDay'),remMonthEl=$('remMonth'),remYearEl=$('remYear'),remTextEl=$('remText');
const btnRemConf=$('btnRemConfirm'),btnRemCancel=$('btnRemCancel');
const reminderList=$('reminder-list');
const timeEl=$('timeDisplay'),timeLabelEl=$('timeLabel');
const progressEl=$('progressFill'),clockFace=$('clockFace');
const roundEl=$('roundNum');
const btnSet=$('btnSet'),inputMin=$('inputMin'),inputSec=$('inputSec');
const btnReset=$('btnReset'),btnMinus6=$('btnMinus6'),btnPlus6=$('btnPlus6');
const btnNext=$('btnNext');
const listEl=$('initiative-list'),emptyState=$('emptyState');
const toastEl=$('toast'),obrHint=$('obrHint');

// в”Ђв”Ђ Populate month dropdowns в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function populateMonthSelect(sel, selected=0){
  sel.innerHTML = MONTHS.map((m,i)=>
    `<option value="${i}"${i===selected?' selected':''}>${m}</option>`).join('');
}
populateMonthSelect(sdMonth,    1);
populateMonthSelect(remMonthEl, 1);

// в”Ђв”Ђ Collapsible в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
document.querySelectorAll('.coll-header').forEach(hdr=>{
  hdr.addEventListener('click',()=>{
    const sec = document.getElementById(hdr.dataset.target);
    sec.classList.toggle('open');
  });
});

// в”Ђв”Ђ Calendar helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function ord(n){ return n+(n===1?'st':n===2?'nd':n===3?'rd':'th'); }
function dowName(day){ return DAYS_OF_WEEK[(day-1)%6]; }
function dateStr(){ return `${dowName(state.day)} the ${ord(state.day)} of ${MONTHS[state.monthIdx]}`; }

function shiftDay(d){
  state.day+=d;
  while(state.day>DAYS_PER_MONTH){ state.day-=DAYS_PER_MONTH; state.monthIdx++;
    if(state.monthIdx>=9){state.monthIdx=0;state.year++;} }
  while(state.day<1){ state.monthIdx--;
    if(state.monthIdx<0){state.monthIdx=8;state.year--;} state.day+=DAYS_PER_MONTH; }
}
function shiftMonth(d){
  state.monthIdx+=d;
  if(state.monthIdx>=9){state.monthIdx=0;state.year++;}
  if(state.monthIdx<0) {state.monthIdx=8;state.year--;}
}

function dueReminders(){
  return reminders.filter(r=>r.monthIdx===state.monthIdx&&r.day===state.day&&r.year===state.year);
}

// в”Ђв”Ђ Render в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function render(){
  // Calendar
  calDateEl.textContent = dateStr();
  calYearEl.textContent = `Year ${state.year} of Concord`;

  const hol = BUILTIN_HOLIDAYS.find(h=>h.monthIdx===state.monthIdx&&h.day===state.day);
  calHolEl.textContent  = hol?hol.name:'';
  calHolEl.style.display = hol?'block':'none';

  const due = dueReminders();
  if(due.length){
    calRemDueEl.textContent = 'рџ“Њ '+due.map(r=>r.text).join(' В· ');
    calRemDueEl.style.display='block';
  } else {
    calRemDueEl.style.display='none';
  }

  // Calendar header shows pulse dot when reminder due
  const hasDue = due.length>0;
  calHdrTitle.innerHTML = hasDue
    ? 'рџ“… Calendar &nbsp;<span class="pulse-dot"></span>'
    : 'рџ“… Calendar';

  // Reminders section header dot too
  const anyDue = reminders.some(r=>r.monthIdx===state.monthIdx&&r.day===state.day&&r.year===state.year);
  remHdrTitle.innerHTML = anyDue
    ? 'рџ“Њ Reminders &nbsp;<span class="pulse-dot"></span>'
    : 'рџ“Њ Reminders';

  renderReminders();

  // Timer
  const s=state.remainSeconds,tot=state.totalSeconds;
  timeEl.textContent = tot===0?'--:--':fmt(s);
  progressEl.style.width = tot>0?Math.max(0,s/tot)*100+'%':'100%';
  clockFace.classList.toggle('urgent',tot>0&&s>0&&s<=6);
  clockFace.classList.toggle('done',  tot>0&&s<=0);
  timeLabelEl.textContent = tot===0?'no timer set':s<=0?'time expired':'remaining';
  roundEl.textContent = state.round;

  renderInitiative();
}

function renderReminders(){
  if(!reminders.length){
    reminderList.innerHTML='<div class="empty-rem">No reminders set</div>';
    return;
  }
  const sorted=[...reminders].sort((a,b)=>{
    if(a.year!==b.year) return a.year-b.year;
    if(a.monthIdx!==b.monthIdx) return a.monthIdx-b.monthIdx;
    return a.day-b.day;
  });
  reminderList.innerHTML='';
  for(const r of sorted){
    const isDue=r.monthIdx===state.monthIdx&&r.day===state.day&&r.year===state.year;
    const div=document.createElement('div');
    div.className='rem-item'+(isDue?' due':'');
    div.innerHTML=`
      <span class="rem-date-badge">${ord(r.day)} ${MONTHS[r.monthIdx]} ${r.year}</span>
      <span class="rem-text">${esc(r.text)}</span>
      <span class="rem-del" data-id="${r.id}" title="Delete">вњ•</span>`;
    reminderList.appendChild(div);
  }
}

function renderInitiative(){
  if(!combatants.length){ listEl.innerHTML=''; listEl.appendChild(emptyState); return; }
  emptyState.remove();
  listEl.replaceChildren(...combatants.map((c,i)=>{
    const li=document.createElement('li');
    li.className=i===state.activeTurnIndex?'active-turn':'';
    li.innerHTML=`
      <span class="turn-arrow">в–¶</span>
      <input class="init-input" data-idx="${i}" type="number" value="${c.initiative}" title="Click to edit initiative"/>
      <span class="combatant-name">${c.name}</span>
      <div class="move-btns">
        <button class="move-btn" data-idx="${i}" data-dir="-1" ${i===0?'disabled':''}>в–І</button>
        <button class="move-btn" data-idx="${i}" data-dir="1"  ${i===combatants.length-1?'disabled':''}>в–ј</button>
      </div>`;
    return li;
  }));
}

// Move combatant up or down
listEl.addEventListener('click', e=>{
  const btn = e.target.closest('.move-btn');
  if(!btn || btn.disabled) return;
  const idx = parseInt(btn.dataset.idx);
  const dir = parseInt(btn.dataset.dir);
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= combatants.length) return;
  [combatants[idx], combatants[newIdx]] = [combatants[newIdx], combatants[idx]];
  if(state.activeTurnIndex === idx) state.activeTurnIndex = newIdx;
  else if(state.activeTurnIndex === newIdx) state.activeTurnIndex = idx;
  render(); pushState();
});

// Edit initiative number inline
listEl.addEventListener('change', e=>{
  const input = e.target.closest('.init-input');
  if(!input) return;
  const idx = parseInt(input.dataset.idx);
  const val = parseFloat(input.value) || 0;
  combatants[idx].initiative = val;
  // Update OBR metadata on the token if connected
  if(obr){
    obr.scene.items.updateItems(
      [{id:combatants[idx].id}],
      items => items.forEach(i => i.metadata[META_KEY] = {initiative: val})
    ).catch(()=>{});
  }
  render(); pushState();
});

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(s){ return `${String(Math.floor(Math.abs(s)/60)).padStart(2,'0')}:${String(Math.abs(s)%60).padStart(2,'0')}`; }

// в”Ђв”Ђ Toast в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let tt;
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>toastEl.classList.remove('show'),2400); }

// в”Ђв”Ђ State sync в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function pushState(){
  if(!obr)return;
  try{ await obr.room.setMetadata({[ROOM_KEY]:JSON.stringify({...state,reminders,nextRemId})}); }
  catch(e){}
}
function applyRemote(raw){
  try{
    const d=JSON.parse(raw);
    ['year','monthIdx','day','totalSeconds','remainSeconds','round','activeTurnIndex']
      .forEach(k=>{ if(k in d) state[k]=d[k]; });
    if(d.reminders) reminders=d.reminders;
    if(d.nextRemId) nextRemId=d.nextRemId;
    render();
  }catch(e){}
}

// в”Ђв”Ђ Combat в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function deductRound(){
  if(state.totalSeconds>0){
    state.remainSeconds=Math.max(0,state.remainSeconds-6);
    if(state.remainSeconds===0) toast("вЏ° Time's up!");
  }
}
function advanceTurn(){
  if(!combatants.length){
    // No combatants вЂ” each press is one full round
    state.round++;
    deductRound();
    toast(`Round ${state.round}${state.totalSeconds>0?' В· '+fmt(state.remainSeconds)+' left':''}`);
  } else {
    state.activeTurnIndex++;
    const roundComplete = state.activeTurnIndex >= combatants.length;
    if(roundComplete){
      // Everyone has gone вЂ” new round, deduct time
      state.activeTurnIndex = 0;
      state.round++;
      deductRound();
      toast(`вљ” Round ${state.round} begins${state.totalSeconds>0?' В· '+fmt(state.remainSeconds)+' left':''} В· ${combatants[0].name}'s turn`);
    } else {
      // Mid-round turn вЂ” no time deduction
      toast(`${combatants[state.activeTurnIndex].name}'s turn`);
    }
  }
  render(); pushState();
}

// в”Ђв”Ђ Button wiring в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
btnPrevDay.addEventListener('click', ()=>{ shiftDay(-1);   render(); pushState(); });
btnNextDay.addEventListener('click', ()=>{ shiftDay(1);    render(); pushState(); });
btnPrevMo.addEventListener('click',  ()=>{ shiftMonth(-1); render(); pushState(); });
btnNextMo.addEventListener('click',  ()=>{ shiftMonth(1);  render(); pushState(); });

btnToggleSD.addEventListener('click',()=>{
  const open=setDateForm.classList.toggle('open');
  btnToggleSD.textContent=open?'вњ• Cancel':'вњЋ Set Date Directly';
  if(open){ sdDay.value=state.day; sdYear.value=state.year; populateMonthSelect(sdMonth,state.monthIdx); }
});
btnSDConf.addEventListener('click',()=>{
  state.day=Math.max(1,Math.min(36,parseInt(sdDay.value)||1));
  state.monthIdx=parseInt(sdMonth.value);
  state.year=Math.max(0,parseInt(sdYear.value)||0);
  setDateForm.classList.remove('open');
  btnToggleSD.textContent='вњЋ Set Date Directly';
  render(); pushState(); toast(`Date set В· ${dateStr()}, Yr ${state.year}`);
});
btnSDCancel.addEventListener('click',()=>{
  setDateForm.classList.remove('open');
  btnToggleSD.textContent='вњЋ Set Date Directly';
});

btnAddRem.addEventListener('click',()=>{
  const open=addRemForm.classList.toggle('open');
  btnAddRem.textContent=open?'вњ•':'+ Add';
  if(open){ remDayEl.value=state.day; remYearEl.value=state.year;
    populateMonthSelect(remMonthEl,state.monthIdx); remTextEl.value='';
    setTimeout(()=>remTextEl.focus(),50); }
});
btnRemConf.addEventListener('click',()=>{
  const d=Math.max(1,Math.min(36,parseInt(remDayEl.value)||1));
  const m=parseInt(remMonthEl.value);
  const y=Math.max(0,parseInt(remYearEl.value)||0);
  const t=remTextEl.value.trim();
  if(!t){ toast('Enter a reminder note'); return; }
  reminders.push({id:nextRemId++,monthIdx:m,day:d,year:y,text:t});
  addRemForm.classList.remove('open'); btnAddRem.textContent='+ Add';
  render(); pushState(); toast(`Reminder set В· ${ord(d)} ${MONTHS[m]} ${y}`);
});
btnRemCancel.addEventListener('click',()=>{
  addRemForm.classList.remove('open'); btnAddRem.textContent='+ Add';
});
reminderList.addEventListener('click',e=>{
  if(e.target.classList.contains('rem-del')){
    reminders=reminders.filter(r=>r.id!==parseInt(e.target.dataset.id));
    render(); pushState();
  }
});

btnSet.addEventListener('click',()=>{
  const m=Math.max(0,parseInt(inputMin.value)||0);
  const s=Math.max(0,Math.min(59,parseInt(inputSec.value)||0));
  const tot=m*60+s; if(!tot){toast('Enter a duration');return;}
  state.totalSeconds=tot; state.remainSeconds=tot; state.round=1; state.activeTurnIndex=0;
  render(); pushState(); toast(`Timer set В· ${fmt(tot)}`);
});
btnMinus6.addEventListener('click',()=>{ if(state.totalSeconds){ state.remainSeconds=Math.max(0,state.remainSeconds-6); render(); pushState(); }});
btnPlus6.addEventListener('click', ()=>{ if(state.totalSeconds){ state.remainSeconds+=6; render(); pushState(); }});
btnReset.addEventListener('click', ()=>{ state.remainSeconds=state.totalSeconds; state.round=1; state.activeTurnIndex=0; render(); pushState(); });
btnNext.addEventListener('click',   advanceTurn);
inputSec.addEventListener('blur',()=>{ inputSec.value=Math.max(0,Math.min(59,parseInt(inputSec.value)||0)).toString().padStart(2,'0'); });

// в”Ђв”Ђ OBR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
(async()=>{
  try{
    const mod=await import('https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm');
    obr=mod.default;
    await obr.onReady(async()=>{
      obrHint.style.display='block';
      const rm=await obr.room.getMetadata();
      if(rm[ROOM_KEY]) applyRemote(rm[ROOM_KEY]);
      obr.room.onMetadataChange(m=>{ if(m[ROOM_KEY]) applyRemote(m[ROOM_KEY]); });
      const loadItems=items=>{
        const found=[];
        for(const item of items){ const md=item.metadata[META_KEY];
          if(md !== undefined && md !== null) found.push({id:item.id,name:item.name,initiative:parseFloat(md.initiative)||0}); }
        found.sort((a,b)=>b.initiative-a.initiative);
        combatants=found; render();
      };
      loadItems(await obr.scene.items.getItems());
      obr.scene.items.onChange(loadItems);
      obr.contextMenu.create({
        id:`${EXT_ID}/context-menu`,
        icons:[
          {icon:'/icon.svg',label:'Add to Initiative',filter:{every:[{key:['metadata',META_KEY],value:undefined}]}},
          {icon:'/icon.svg',label:'Remove from Initiative',filter:{some:[{key:['metadata',META_KEY],value:undefined,operator:'!='}]}},
        ],
        async onClick(ctx){
          const adding=ctx.items.every(i=>i.metadata[META_KEY]===undefined);
          if(adding){
            await obr.scene.items.updateItems(ctx.items,items=>items.forEach(i=>i.metadata[META_KEY]={initiative:0}));
            toast(`Added ${ctx.items.length} combatant${ctx.items.length>1?'s':''} вЂ” set initiative in app`);
          } else {
            await obr.scene.items.updateItems(ctx.items,items=>items.forEach(i=>delete i.metadata[META_KEY]));
          }
        }
      });
    });
  }catch(e){ obrHint.textContent='Standalone mode'; }
})();

render();
</script>
</body>
</html>
